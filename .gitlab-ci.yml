stages:
  - check
  - build
  - manifest
  - release

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}

.build-rules:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - Dockerfile
        - .dockerignore
        - .gitlab-ci.yml
        - Cross.toml
        - Cargo.lock
        - Cargo.toml
        - tuishark/**/*
        - tuishark-ebpf/**/*

# --- Stage 0: FreeBSD cross-compiled tests ---

test-freebsd:
  stage: check
  tags:
    - x86_64
  image: rust:1.94-bookworm
  services:
    - docker:27-dind
  variables:
    # cross-rs manages Docker internally; TLS disabled because the rust image
    # lacks the Docker client and /certs volume sharing does not apply.
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  cache:
    key: freebsd-test
    paths:
      - .cargo/registry/
      - .cargo/bin/
  script:
    - command -v cross || cargo install cross --version 0.2.5 --locked
    # trace feature excluded: aya/eBPF is Linux-only; stub impls compile cleanly.
    - cross test --locked --target x86_64-unknown-freebsd -p tuishark
  # TODO(#37): remove allow_failure once FreeBSD test suite is confirmed stable under QEMU
  allow_failure: true
  extends: .build-rules

# --- Stage 1: native builds in parallel ---

build-amd64:
  stage: build
  timeout: 2h
  tags:
    - x86_64
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --push --tag "${IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64" .
  extends: .build-rules

build-arm64:
  stage: build
  timeout: 2h
  tags:
    - aarch64
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --push --tag "${IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64" .
  extends: .build-rules

build-freebsd:
  stage: build
  timeout: 1h
  tags:
    - x86_64
  image: rust:1.94-bookworm
  services:
    - docker:27-dind
  variables:
    # cross-rs manages Docker internally; TLS disabled because the rust image
    # lacks the Docker client and /certs volume sharing does not apply.
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  cache:
    key: freebsd-build
    paths:
      - .cargo/registry/
      - .cargo/bin/
  script:
    - command -v cross || cargo install cross --version 0.2.5 --locked
    # trace feature excluded: aya/eBPF is Linux-only; stub impls compile cleanly.
    - cross build --locked --release --target x86_64-unknown-freebsd -p tuishark
    - cp target/x86_64-unknown-freebsd/release/tuishark tuishark-freebsd-amd64
    - strip tuishark-freebsd-amd64 || true
  artifacts:
    paths:
      - tuishark-freebsd-amd64
    expire_in: 30 days
  extends: .build-rules

# --- Stage 2: combine into multi-arch manifest ---

create-manifest:
  stage: manifest
  tags:
    - x86_64
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      SOURCES="${IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64 ${IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64"

      # Always tag with short SHA
      docker manifest create "${IMAGE}:${CI_COMMIT_SHORT_SHA}" $SOURCES
      docker manifest push "${IMAGE}:${CI_COMMIT_SHORT_SHA}"

      # Tag with branch name
      if [ -n "$CI_COMMIT_BRANCH" ]; then
        BRANCH_TAG=$(echo "$CI_COMMIT_BRANCH" | sed 's|[^a-zA-Z0-9._-]|-|g')
        docker manifest create "${IMAGE}:${BRANCH_TAG}" $SOURCES
        docker manifest push "${IMAGE}:${BRANCH_TAG}"
      fi

      # Tag as latest on default branch
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker manifest create "${IMAGE}:latest" $SOURCES
        docker manifest push "${IMAGE}:latest"
      fi

      # Tag with git tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create "${IMAGE}:${CI_COMMIT_TAG}" $SOURCES
        docker manifest push "${IMAGE}:${CI_COMMIT_TAG}"
      fi
  extends: .build-rules

# --- Stage 3: FreeBSD release (semver tags only) ---
# NOTE: this job creates the GitLab release object. If Linux binaries are added
# later, refactor into a single unified release job to avoid 409 conflicts.

release-freebsd:
  stage: release
  tags:
    - x86_64
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-freebsd
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  script:
    - |
      # Upload binary to the Generic Package Registry for a stable download URL
      apk add --no-cache curl
      curl -f --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file tuishark-freebsd-amd64 \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/tuishark/${CI_COMMIT_TAG}/tuishark-freebsd-amd64"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release ${CI_COMMIT_TAG}"
    description: |
      TuiShark ${CI_COMMIT_TAG}

      ## FreeBSD amd64 binary

      Download `tuishark-freebsd-amd64` from the assets below.
      Requires `tshark` for deep dissection: `pkg install wireshark-nox11`.
    assets:
      links:
        - name: "tuishark-freebsd-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/tuishark/${CI_COMMIT_TAG}/tuishark-freebsd-amd64"
          link_type: package
