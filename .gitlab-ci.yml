stages:
  - check
  - build
  - manifest
  - release

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}

.build-rules:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - Dockerfile
        - .dockerignore
        - .gitlab-ci.yml
        - Cargo.lock
        - Cargo.toml
        - tuishark/**/*
        - tuishark-ebpf/**/*

# --- Stage 0: FreeBSD cross-compilation build ---

build-freebsd:
  stage: build
  tags:
    - x86_64
  image: rust:1.94-bookworm
  variables:
    CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  cache:
    key: freebsd-build
    paths:
      - .cargo/registry/
      - target/
  script:
    - cargo install cross --locked || true
    - cross build --target x86_64-unknown-freebsd -p tuishark --release
    - cp target/x86_64-unknown-freebsd/release/tuishark tuishark-freebsd-amd64
    - llvm-strip tuishark-freebsd-amd64 2>/dev/null || strip tuishark-freebsd-amd64 2>/dev/null || true
  artifacts:
    paths:
      - tuishark-freebsd-amd64
    expire_in: 30 days
  extends: .build-rules

# --- Stage 1: native builds in parallel ---

build-amd64:
  stage: build
  timeout: 2h
  tags:
    - x86_64
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --push --tag "${IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64" .
  extends: .build-rules

build-arm64:
  stage: build
  timeout: 2h
  tags:
    - aarch64
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --push --tag "${IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64" .
  extends: .build-rules

# --- Stage 2: combine into multi-arch manifest ---

create-manifest:
  stage: manifest
  tags:
    - x86_64
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      SOURCES="${IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64 ${IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64"

      # Always tag with short SHA
      docker manifest create "${IMAGE}:${CI_COMMIT_SHORT_SHA}" $SOURCES
      docker manifest push "${IMAGE}:${CI_COMMIT_SHORT_SHA}"

      # Tag with branch name
      if [ -n "$CI_COMMIT_BRANCH" ]; then
        BRANCH_TAG=$(echo "$CI_COMMIT_BRANCH" | sed 's|[^a-zA-Z0-9._-]|-|g')
        docker manifest create "${IMAGE}:${BRANCH_TAG}" $SOURCES
        docker manifest push "${IMAGE}:${BRANCH_TAG}"
      fi

      # Tag as latest on default branch
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker manifest create "${IMAGE}:latest" $SOURCES
        docker manifest push "${IMAGE}:latest"
      fi

      # Tag with git tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create "${IMAGE}:${CI_COMMIT_TAG}" $SOURCES
        docker manifest push "${IMAGE}:${CI_COMMIT_TAG}"
      fi
  extends: .build-rules

# --- Stage 3: publish FreeBSD binary as GitLab release asset on tags ---

release-freebsd:
  stage: release
  tags:
    - x86_64
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-freebsd
      artifacts: true
  script:
    - echo "Publishing FreeBSD binary for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: tuishark-freebsd-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/tuishark-freebsd-amd64?job=build-freebsd"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
