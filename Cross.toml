# Cross-compilation configuration for FreeBSD targets.
# Usage: cross build --target x86_64-unknown-freebsd -p tuishark --release
#
# Requires Docker and the cross tool: cargo install cross
# FreeBSD builds exclude the `trace` feature (eBPF is Linux-only).

[target.x86_64-unknown-freebsd]
# cross provides a pre-built Docker image with FreeBSD sysroot.
# libpcap is included in the FreeBSD base system — no extra packages needed.
# tshark is NOT included; install separately on the target: pkg install wireshark-nox11
